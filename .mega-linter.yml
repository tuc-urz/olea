# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation
---
# all, none, or list of linter keys
APPLY_FIXES: all

# If you use ENABLE variable, all other languages/formats/tooling-formats will
# be disabled by default
# ENABLE:

# If you use ENABLE_LINTERS variable, all other linters will be disabled by
# default
# ENABLE_LINTERS:

# DISABLE:
  # - COPYPASTE # Uncomment to disable checks of excessive copy-pastes
  # - SPELL # Uncomment to disable checks of spelling mistakes

SHOW_ELAPSED_TIME: true

# Exclude the vendored redux-offline fork (packages/libraries/redux-offline)
# from all linters — it is a third-party fork, not first-party code.
FILTER_REGEX_EXCLUDE: (packages/libraries/redux-offline/)

# Only genuine code errors block CI. The linters below still run and report,
# but their findings are NON-BLOCKING warnings (noise, advisory, or dependency
# findings that cannot be fixed by editing first-party code).
DISABLE_ERRORS_LINTERS:
  - SPELL_CSPELL            # dictionary/term hits — needs a project dictionary
  - SPELL_LYCHEE            # external link checks — flaky, network-dependent
  - COPYPASTE_JSCPD         # duplication metric, not a correctness error
  - MARKDOWN_MARKDOWNLINT   # documentation style
  - REPOSITORY_DEVSKIM      # advisory notes (TODO/FIXME, setTimeout, localhost)
  - REPOSITORY_CHECKOV      # GitHub-Actions hardening opinions
  - REPOSITORY_GRYPE        # dependency CVEs — belong in Dependabot, not a lint gate
  - REPOSITORY_OSV_SCANNER  # dependency CVEs — belong in Dependabot, not a lint gate
  - REPOSITORY_TRIVY        # dependency CVEs — belong in Dependabot, not a lint gate
  - ACTION_ZIZMOR           # needs GitHub API auth; advisory workflow audit

# Disabled entirely: ts-standard cannot run without a tsconfig.json
# (repo has a single .ts file), so it only emits a setup error.
DISABLE_LINTERS:
  - TYPESCRIPT_TS_STANDARD

# Uncomment if you want MegaLinter to detect errors but not block CI to pass
# DISABLE_ERRORS: true
